<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hakki Tech Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .card { background-color: var(--tg-theme-secondary-bg-color); }
        .btn-primary { background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); }
    </style>
</head>
<body class="p-4 font-sans">

    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold italic">HAKKI TECH</h1>
        <p class="text-sm opacity-70">Выберите компоненты вашей автоматизации</p>
    </div>

    <div class="grid grid-cols-1 gap-4 mb-20">
        <div class="card p-4 rounded-2xl flex justify-between items-center shadow-sm" onclick="toggleService(this, 'AI-Сотрудник', 30000)">
            <div>
                <h3 class="font-bold">🧠 AI-Сотрудник</h3>
                <p class="text-xs opacity-60">Обучен под ваш регламент</p>
            </div>
            <div class="text-right">
                <span class="font-mono text-sm">30,000₽</span>
            </div>
        </div>

        <div class="card p-4 rounded-2xl flex justify-between items-center shadow-sm" onclick="toggleService(this, 'Mini App Магазин', 45000)">
            <div>
                <h3 class="font-bold">📱 Mini App Магазин</h3>
                <p class="text-xs opacity-60">Web-интерфейс в TG</p>
            </div>
            <div class="text-right">
                <span class="font-mono text-sm">45,000₽</span>
            </div>
        </div>

        <div class="card p-4 rounded-2xl flex justify-between items-center shadow-sm" onclick="toggleService(this, 'Автоворонка', 15000)">
            <div>
                <h3 class="font-bold">📈 Автоворонка</h3>
                <p class="text-xs opacity-60">Цепочка дожима лидов</p>
            </div>
            <div class="text-right">
                <span class="font-mono text-sm">15,000₽</span>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран
        
        let selectedServices = [];
        let totalPrice = 0;

        function toggleService(el, name, price) {
            if (el.classList.contains('border-2')) {
                el.classList.remove('border-2', 'border-blue-500');
                selectedServices = selectedServices.filter(s => s !== name);
                totalPrice -= price;
            } else {
                el.classList.add('border-2', 'border-blue-500');
                selectedServices.push(name);
                totalPrice += price;
            }

            // Управляем главной кнопкой Telegram
            if (totalPrice > 0) {
                tg.MainButton.text = `Заказать проект за ${totalPrice}₽`;
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        // Обработка нажатия на главную кнопку
        tg.onEvent('mainButtonClicked', function() {
            // Отправляем данные обратно в бот
            let data = {
                services: selectedServices,
                total: totalPrice
            };
            tg.sendData(JSON.stringify(data)); 
        });
    </script>
</body>
</html>
